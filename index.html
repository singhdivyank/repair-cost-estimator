  <style>
/* Design tokens ------------------------------------------------------- */
:root {
  --bg-base: #0b0d0f;
  --bg-surface: #15181c;
  --bg-surface-raised: #1d2126;
  --bg-surface-hover: #232830;
  --border: #2a2f36;
  --border-subtle: #1e2227;

  --text-primary: #f3f1ed;
  --text-secondary: #98a0a8;
  --text-tertiary: #5f6870;

  --accent: #d45101;
  --accent-hover: #ea6416;
  --accent-soft: rgba(212, 81, 1, 0.14);
  --accent-text: #ff8a3d;

  --success: #2f8fea;
  --success-soft: rgba(47, 143, 234, 0.14);
  --danger: #e5484d;
  --danger-soft: rgba(229, 72, 77, 0.14);
  --warning: #e8a83f;
  --warning-soft: rgba(232, 168, 63, 0.14);

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.25);

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}
h1, h2, h3, p { margin: 0; }
button { font-family: inherit; }
input, select, textarea { font-family: inherit; }

.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* App shell ------------------------------------------------------------ */
#app-shell {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-base);
  position: relative;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  padding: calc(14px + var(--safe-top)) 20px 14px;
  background: rgba(11, 13, 15, 0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.topbar-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
.topbar-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.topbar-logo { height: 22px; width: auto; display: block; }

.brand-row { display: flex; align-items: center; gap: 10px; }

main.screen {
  flex: 1;
  padding: 16px 16px calc(96px + var(--safe-bottom));
  overflow-y: auto;
}

/* Bottom nav ------------------------------------------------------------ */
.bottom-nav {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  background: rgba(21, 24, 28, 0.96);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border-subtle);
  padding: 6px 4px calc(6px + var(--safe-bottom));
  z-index: 30;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 11px;
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  min-height: 44px;
  transition: color 0.15s ease;
}
.nav-btn.active { color: var(--accent-text); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn:disabled { opacity: 0.35; }

/* Buttons ---------------------------------------------------------------- */
.btn {
  appearance: none;
  border: none;
  border-radius: var(--radius-md);
  font-size: 15px;
  font-weight: 600;
  padding: 13px 18px;
  min-height: 44px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.08s ease, background 0.15s ease, opacity 0.15s ease;
}
.btn:active { transform: scale(0.98); }
.btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--bg-surface-raised); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-surface-hover); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-surface-hover); }
.btn-danger { background: var(--danger-soft); color: var(--danger); }
.btn-block { width: 100%; }
.btn-icon { width: 44px; height: 44px; padding: 0; border-radius: 50%; background: var(--bg-surface-raised); color: var(--text-primary); }
.btn-icon svg { width: 20px; height: 20px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.fab {
  position: absolute;
  top: 14px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px rgba(212, 81, 1, 0.35);
}
.fab svg { width: 20px; height: 20px; }

/* Inputs ------------------------------------------------------------------ */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.input, select.input {
  width: 100%;
  background: var(--bg-surface-raised);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 15px;
  min-height: 44px;
}
.input:focus, select.input:focus {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
  border-color: var(--accent);
}
.input-row { display: flex; gap: 10px; }
.input-row .field { flex: 1; }

.stepper { display: flex; align-items: center; gap: 10px; }
.stepper button {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-surface-raised);
  color: var(--text-primary);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}
.stepper input {
  width: 56px; text-align: center;
  background: var(--bg-surface-raised);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: var(--radius-sm);
  min-height: 36px;
}

/* Search ------------------------------------------------------------------ */
.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  margin-bottom: 16px;
  color: var(--text-secondary);
}
.search-bar input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 15px;
}
.search-bar input:focus { outline: none; }
.search-bar svg { width: 18px; height: 18px; flex-shrink: 0; }

.filter-row { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; }
.chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  background: var(--bg-surface-raised);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.chip.active { background: var(--accent-soft); color: var(--accent-text); border-color: rgba(212, 81, 1, 0.4); }

/* Project cards ------------------------------------------------------------ */
.project-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
  position: relative;
}
.project-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.project-address { font-size: 16px; font-weight: 700; line-height: 1.3; }
.project-meta { font-size: 12.5px; color: var(--text-tertiary); margin-top: 4px; }
.project-estimate { font-size: 17px; font-weight: 700; color: var(--accent-text); white-space: nowrap; }
.project-progress-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.progress-track {
  flex: 1;
  height: 6px;
  border-radius: 4px;
  background: var(--bg-surface-raised);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-hover));
  border-radius: 4px;
  transition: width 0.3s ease;
}
.progress-fill.complete { background: linear-gradient(90deg, var(--success), #6db3f2); }
.progress-pct { font-size: 12px; font-weight: 700; color: var(--text-secondary); width: 34px; text-align: right; }

.status-badge {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 3px 8px;
  border-radius: 999px;
}
.status-badge.active { background: var(--accent-soft); color: var(--accent-text); }
.status-badge.complete { background: var(--success-soft); color: var(--success); }
.status-badge.archived { background: var(--bg-surface-raised); color: var(--text-tertiary); }

.card-menu-btn {
  background: none; border: none; color: var(--text-tertiary);
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.card-menu-btn svg { width: 18px; height: 18px; }
.card-menu-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }

/* Empty state ---------------------------------------------------------------- */
.empty-state {
  text-align: center;
  padding: 64px 24px 24px;
  color: var(--text-secondary);
}
.empty-state .mark { width: 56px; height: 56px; margin: 0 auto 18px; opacity: 0.55; }
.empty-state h3 { font-size: 16px; color: var(--text-primary); margin-bottom: 6px; }
.empty-state p { font-size: 13.5px; line-height: 1.5; }

/* Modal / sheet ---------------------------------------------------------------- */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 90;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.sheet {
  width: 100%;
  max-width: 480px;
  max-height: 88vh;
  background: var(--bg-surface);
  border-radius: 20px 20px 0 0;
  padding: 8px 20px calc(24px + var(--safe-bottom));
  overflow-y: auto;
  border-top: 1px solid var(--border);
  animation: sheet-up 0.22s ease;
}
@keyframes sheet-up { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 10px auto 14px; }
.sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.sheet-header h2 { font-size: 18px; font-weight: 700; }
.sheet-actions { display: flex; gap: 10px; margin-top: 8px; }

.action-list { display: flex; flex-direction: column; gap: 2px; }
.action-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 6px;
  background: none; border: none; color: var(--text-primary);
  font-size: 15px; text-align: left;
  border-radius: var(--radius-sm);
  min-height: 44px;
}
.action-item:hover { background: var(--bg-surface-hover); }
.action-item.danger { color: var(--danger); }
.action-item svg { width: 20px; height: 20px; color: var(--text-secondary); flex-shrink: 0; }
.action-item.danger svg { color: var(--danger); }

/* Toast --------------------------------------------------------------------- */
.toast {
  position: fixed;
  bottom: calc(96px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-surface-raised);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 11px 18px;
  border-radius: 999px;
  font-size: 13.5px;
  font-weight: 600;
  box-shadow: var(--shadow-card);
  z-index: 100;
  max-width: 90%;
}

/* Reduced motion --------------------------------------------------------------- */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

/* Group accordion (Room Detail) ------------------------------------------------ */
.group-list { display: flex; flex-direction: column; gap: 10px; }
.group-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.group-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: none;
  border: none;
  color: var(--text-primary);
  padding: 14px 14px;
  min-height: 48px;
  font-size: 14.5px;
  font-weight: 600;
}
.group-header svg { color: var(--text-tertiary); width: 18px; height: 18px; transition: transform 0.15s ease; }
.group-status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-tertiary);
  flex-shrink: 0;
}
.group-status-dot.complete { background: var(--success); }
.group-name { text-align: left; }
.group-body {
  padding: 4px 14px 14px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.no-action-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 6px;
  font-size: 13.5px;
  color: var(--text-secondary);
  border-bottom: 1px dashed var(--border-subtle);
  margin-bottom: 6px;
}
.no-action-row span { display: flex; align-items: center; gap: 6px; }
.no-action-row svg { width: 15px; height: 15px; }
.no-action-row input { width: 18px; height: 18px; accent-color: var(--accent); }

.repair-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 6px;
  border-bottom: 1px solid var(--border-subtle);
}
.repair-row:last-of-type { border-bottom: none; }
.repair-checkbox input { width: 20px; height: 20px; accent-color: var(--accent); }
.repair-row-main { flex: 1; min-width: 0; }
.repair-row-name { font-size: 14px; font-weight: 500; }
.repair-row-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.repair-row-sub [data-action="edit-price"] { cursor: pointer; text-decoration: underline dotted; text-underline-offset: 2px; }
.override-tag {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--accent-text);
  background: var(--accent-soft);
  padding: 1px 6px;
  border-radius: 999px;
}
.repair-row-total { width: 64px; text-align: right; font-size: 13.5px; font-weight: 700; flex-shrink: 0; }
.row-trash-btn {

  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.row-trash-btn svg { width: 16px; height: 16px; }
.row-trash-btn:hover { color: var(--danger); }

.stepper-sm { flex-shrink: 0; }
.stepper-sm button { width: 26px; height: 26px; }
.stepper-sm button svg { width: 13px; height: 13px; }
.stepper-sm input {
  width: 38px; font-size: 13px; padding: 4px; min-height: unset; height: 26px;
  background: var(--bg-surface-raised);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 6px;
  text-align: center;
}

.repair-item-block { border-bottom: 1px solid var(--border-subtle); }
.repair-item-block:last-of-type { border-bottom: none; }
.repair-item-block .repair-row { border-bottom: none; }
.repair-item-extras { padding: 0 6px 10px 42px; display: flex; flex-direction: column; gap: 8px; }

.photo-strip { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.photo-thumb {
  position: relative;
  width: 52px; height: 52px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-remove {
  position: absolute; top: 2px; right: 2px;
  width: 16px; height: 16px;
  background: rgba(0,0,0,0.65);
  border: none; border-radius: 50%;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.photo-remove svg { width: 10px; height: 10px; }
.photo-add-btn {
  width: 52px; height: 52px;
  border-radius: 8px;
  border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary);
  flex-shrink: 0;
  cursor: pointer;
}
.photo-add-btn svg { width: 18px; height: 18px; }
.photo-add-btn:hover { color: var(--accent-text); border-color: var(--accent); }

.scan-equipment-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--accent-text);
  background: var(--accent-soft);
  padding: 7px 12px;
  border-radius: 999px;
  cursor: pointer;
  width: fit-content;
}
.scan-equipment-btn svg { width: 14px; height: 14px; }

.equipment-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-surface-raised);
  border: 1px solid var(--border-subtle);
  padding: 8px 10px;
  border-radius: 10px;
}
.equipment-chip svg { width: 14px; height: 14px; color: var(--success); flex-shrink: 0; }
.link-btn {
  margin-left: auto;
  background: none; border: none;
  color: var(--accent-text);
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}

.scan-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.scan-overlay-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  font-size: 14px;
  color: var(--text-primary);
  text-align: center;
  max-width: 260px;
}
.scan-overlay-card .spin { width: 28px; height: 28px; color: var(--accent); animation: spin 1s linear infinite; }
.spin { display: inline-flex; animation: spin 1s linear infinite; }
.spin svg { width: 28px; height: 28px; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Summary screen ------------------------------------------------------------------- */
.section-heading {
  font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--text-tertiary); margin-bottom: 8px;
}
.cat-bar-row { display: flex; align-items: center; gap: 10px; padding: 9px 4px; }
.cat-bar-label { width: 96px; flex-shrink: 0; font-size: 12.5px; color: var(--text-secondary); }
.cat-bar-track { flex: 1; height: 8px; background: var(--bg-surface-raised); border-radius: 4px; overflow: hidden; }
.cat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-hover)); border-radius: 4px; }
.cat-bar-value { width: 74px; text-align: right; font-size: 12.5px; font-weight: 700; flex-shrink: 0; }

.room-summary-row {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; color: var(--text-primary);
  padding: 12px 8px;
  border-bottom: 1px solid var(--border-subtle);
  min-height: 48px;
  text-align: left;
}
.room-summary-row:last-child { border-bottom: none; }
.room-summary-row:hover { background: var(--bg-surface-hover); }
.room-summary-name { font-size: 14px; font-weight: 600; }

.export-warning {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--warning);
  background: var(--warning-soft);
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
}
.export-warning svg { width: 16px; height: 16px; flex-shrink: 0; }
.export-btn svg { width: 18px; height: 18px; }

/* AI Advisor ------------------------------------------------------------------------ */
.advisor-project-row {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; color: var(--text-primary);
  padding: 13px 8px;
  border-bottom: 1px solid var(--border-subtle);
  min-height: 48px;
  text-align: left;
}
.advisor-project-row:last-child { border-bottom: none; }
.advisor-project-row:hover:not(.locked) { background: var(--bg-surface-hover); }
.advisor-project-row.locked { opacity: 0.55; cursor: not-allowed; }
.advisor-project-row svg { width: 18px; height: 18px; color: var(--text-tertiary); flex-shrink: 0; }
.advisor-project-row .project-meta { display: flex; align-items: center; gap: 5px; }
.advisor-project-row .project-meta svg { width: 13px; height: 13px; }

/* Focus visibility ---------------------------------------------------------------- */
a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

  var STORE3 = "rooms";
  function resolveGroupsForType(type) {
    const wholeHouse = WHOLE_HOUSE_ROOMS.find((w) => w.type === type);
    if (wholeHouse) return SECTION_GROUPS[wholeHouse.section];
    const template = ROOM_TYPES[type];
    if (template) return template.groups;
    return [];
  }
  var roomRepository = {
    async listByProject(projectId) {
      const rooms = await db.getAllByIndex(STORE3, "projectId", projectId);
      return rooms.sort((a, b) => (a.order || 0) - (b.order || 0));
    },
    async get(id) {
      return db.get(STORE3, id);
    },
    async create(projectId, { type, name, groups = void 0 }) {
      const existing = await this.listByProject(projectId);
      const id = makeId("room");
      const timestamp = nowIso();
      const resolvedGroups = groups === null ? [] : groups || resolveGroupsForType(type);
      const room = {
        id,
        projectId,
        type,
        name,
        order: existing.length,
        createdAt: timestamp,
        updatedAt: timestamp,
        groups: resolvedGroups,
        noActionGroups: {}
      };
      await db.put(STORE3, room);
      return room;
    },
    async rename(id, name) {
      const room = await db.get(STORE3, id);
      if (!room) return null;
      room.name = name;
      room.updatedAt = nowIso();
      await db.put(STORE3, room);
      return room;
    },
    async setNoActionNeeded(id, groupName, value) {
      const room = await db.get(STORE3, id);
      if (!room) return null;
      room.noActionGroups = { ...room.noActionGroups, [groupName]: value };
      room.updatedAt = nowIso();
      await db.put(STORE3, room);
      return room;
    },
    async reorder(projectId, orderedIds) {
      const rooms = await this.listByProject(projectId);
      const byId = new Map(rooms.map((r) => [r.id, r]));
      const updates = orderedIds.map((id, idx) => {
        const room = byId.get(id);
        room.order = idx;
        return room;
      });
      await db.putMany(STORE3, updates);
      return updates;
    },
    async remove(id) {
      const items = await repairRepository.listByRoom(id);
      for (const item of items) {
        await repairRepository.remove(item.id);
      }
      const photos = await photoRepository.listByRoom(id);
      for (const photo of photos) {
        await photoRepository.remove(photo.id);
      }
      await db.delete(STORE3, id);
    },
    // Is this room type an addable/removable field instance, or a permanent
    // whole-house singleton created at project setup?
    isSingleton(type) {
      return WHOLE_HOUSE_ROOMS.some((w) => w.type === type);
    },
    async duplicateInto(room, newProjectId) {
      const id = makeId("room");
      const timestamp = nowIso();
      const copy = {
        ...room,
        id,
        projectId: newProjectId,
        createdAt: timestamp,
        updatedAt: timestamp,
        noActionGroups: { ...room.noActionGroups }
      };
      await db.put(STORE3, copy);
      const items = await repairRepository.listByRoom(room.id);
      for (const item of items) {
        await repairRepository.duplicateInto(item, id, newProjectId);
      }
      return copy;
    }
  };

  var STORE4 = "projects";
  var projectRepository = {
    async list() {
      const all = await db.getAll(STORE4);
      return all.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    },
    async get(id) {
      return db.get(STORE4, id);
    },
    async create({ address, propertyType = "single_family", bedrooms = 3, bathrooms = 2, garage = false, squareFootage = null, purchasePrice = null, arv = null, targetMarginPct = 20 }) {
      const id = makeId("proj");
      const timestamp = nowIso();
      const project = {
        id,
        address: address || "Untitled Property",
        propertyType,
        bedrooms,
        bathrooms,
        garage,
        squareFootage,
        purchasePrice,
        arv,
        targetMarginPct,
        createdAt: timestamp,
        updatedAt: timestamp,
        status: "active",
        currentEstimate: 0,
        progress: 0,
        projectVersion: 1,
        roomIds: [],
        aiReportId: null
      };
      await db.put(STORE4, project);
      const seededRoomIds = [];
      for (const wh of WHOLE_HOUSE_ROOMS) {
        const room = await roomRepository.create(id, { type: wh.type, name: wh.name });
        seededRoomIds.push(room.id);
      }
      const kitchenRoom = await roomRepository.create(id, { type: "kitchen", name: "Kitchen" });
      seededRoomIds.push(kitchenRoom.id);
      for (let i = 1; i <= Math.max(1, bathrooms); i++) {
        const bathRoom = await roomRepository.create(id, { type: "bathroom", name: `Bathroom ${i}` });
        seededRoomIds.push(bathRoom.id);
      }
      for (let i = 1; i <= Math.max(0, bedrooms); i++) {
        const bedRoom = await roomRepository.create(id, { type: "bedroom", name: `Bedroom ${i}` });
        seededRoomIds.push(bedRoom.id);
      }
      project.roomIds = seededRoomIds;
      await db.put(STORE4, project);
      return project;
    },
    async rename(id, address) {
      const project = await db.get(STORE4, id);
      if (!project) return null;
      project.address = address;
      project.updatedAt = nowIso();
      await db.put(STORE4, project);
      return project;
    },
    async duplicate(id) {
      const original = await db.get(STORE4, id);
      if (!original) return null;
      const rooms = await roomRepository.listByProject(id);
      const newId = makeId("proj");
      const timestamp = nowIso();
      const copy = {
        ...original,
        id: newId,
        address: `${original.address} (Copy)`,
        createdAt: timestamp,
        updatedAt: timestamp,
        status: "active",
        projectVersion: 1,
        aiReportId: null,
        roomIds: []
      };
      await db.put(STORE4, copy);
      const newRoomIds = [];
      for (const room of rooms) {
        const newRoom = await roomRepository.duplicateInto(room, newId);
        newRoomIds.push(newRoom.id);
      }
      copy.roomIds = newRoomIds;
      await db.put(STORE4, copy);
      return copy;
    },
    async archive(id) {
      const project = await db.get(STORE4, id);
      if (!project) return null;
      project.status = "archived";
      project.updatedAt = nowIso();
      await db.put(STORE4, project);
      return project;
    },
    async remove(id) {
      const rooms = await roomRepository.listByProject(id);
      for (const room of rooms) {
        await roomRepository.remove(room.id);
      }
      await db.delete(STORE4, id);
    },
    async touch(id, patch = {}) {
      const project = await db.get(STORE4, id);
      if (!project) return null;
      Object.assign(project, patch, {
        updatedAt: nowIso(),
        projectVersion: (project.projectVersion || 1) + 1
      });
      await db.put(STORE4, project);
      return project;
    },
    async setStatus(id, status) {
      return this.touch(id, { status });
    },
    // Per-project price override: edits the effective unit cost for this
    // catalog item across the whole project (every room that uses it).
    async setPriceOverride(id, itemId, cost) {
      const project = await db.get(STORE4, id);
      if (!project) return null;
      const priceOverrides = { ...project.priceOverrides || {} };
      if (cost === null) delete priceOverrides[itemId];
      else priceOverrides[itemId] = cost;
      project.priceOverrides = priceOverrides;
      project.updatedAt = nowIso();
      project.projectVersion = (project.projectVersion || 1) + 1;
      await db.put(STORE4, project);
      return project;
    },
    // Exporting doesn't change project content, so this intentionally does
    // NOT bump projectVersion or updatedAt (which would otherwise mark a
    // cached AI report STALE just because someone downloaded a report).
    async recordExport(id) {
      const project = await db.get(STORE4, id);
      if (!project) return null;
      project.lastExportedAt = nowIso();
      await db.put(STORE4, project);
      return project;
    }
  };

    async setGlobalOverride(itemId, cost) {

    async getAllGlobalOverrides() {

      const map = {};
      all.forEach((o) => map[o.itemId] = o.cost);
      return map;
    },
    // Resolve the effective unit cost for a catalog item within a project,
    // respecting priority: project-level override > global override > catalog default.
    async resolveUnitCost(itemId, project) {
      const projectOverrides = project?.priceOverrides || {};
      if (Object.prototype.hasOwnProperty.call(projectOverrides, itemId)) {
        return projectOverrides[itemId];
      }
      const globalOverride = await this.getGlobalOverride(itemId);
      if (globalOverride !== null) return globalOverride;
      const catalogItem = await this.getCatalogItem(itemId);
      return catalogItem ? catalogItem.cost : 0;
    },
    async setProjectOverride(project, itemId, cost) {
      project.priceOverrides = { ...project.priceOverrides || {}, [itemId]: cost };
      return project;
    },
    async lineTotal(repairItem, project) {
      if (repairItem.isCustom) {
        return (repairItem.customCost || 0) * (repairItem.quantity || 0);
      }
      const unitCost = await this.resolveUnitCost(repairItem.itemId, project);
      return unitCost * (repairItem.quantity || 0);
    },
    // Running total across the whole project: sum of checked, quantified repair items.
    async calcProjectTotal(project) {
      const items = await repairRepository.listByProject(project.id);
      let total = 0;
      for (const item of items) {
        if (!item.checked) continue;
        total += await this.lineTotal(item, project);
      }
      return total;
    },
    async calcRoomTotal(roomId, project) {
      const items = await repairRepository.listByRoom(roomId);
      let total = 0;
      for (const item of items) {
        if (!item.checked) continue;
        total += await this.lineTotal(item, project);
      }
      return total;
    },
    // Progress: a group is "complete" if it's marked No Action Needed, or if
    // at least one item within it is checked.
    async calcRoomProgress(room) {
      const items = await repairRepository.listByRoom(room.id);
      const groups = room.groups || [];
      if (groups.length === 0) return { completedGroups: 0, totalGroups: 0, pct: 0 };
      let completed = 0;
      for (const group of groups) {
        const noAction = room.noActionGroups?.[group];
        const hasChecked = items.some((i) => i.groupId === group && i.checked);
        if (noAction || hasChecked) completed += 1;
      }
      return { completedGroups: completed, totalGroups: groups.length, pct: Math.round(completed / groups.length * 100) };
    },
    async calcProjectProgress(projectId) {
      const rooms = await roomRepository.listByProject(projectId);
      let totalGroups = 0;
      let completedGroups = 0;
      for (const room of rooms) {
        const p = await this.calcRoomProgress(room);
        totalGroups += p.totalGroups;
        completedGroups += p.completedGroups;
      }
      const pct = totalGroups > 0 ? Math.round(completedGroups / totalGroups * 100) : 0;
      return { completedGroups, totalGroups, pct };

    async getRoomGroupView(room, groupName, project) {
      const catalogItems = this.isCatalogLessGroup(groupName) ? [] : await this.getItemsForGroup(groupName);
      const repairItems = await repairRepository.listByRoom(room.id);
      const relevant = repairItems.filter((r) => r.groupId === groupName);
      const catalogRows = [];
      for (const ci of catalogItems) {
        const existing = relevant.find((r) => r.itemId === ci.id && !r.isCustom);
        const unitCost = await this.resolveUnitCost(ci.id, project);
        const isOverridden = Object.prototype.hasOwnProperty.call(project?.priceOverrides || {}, ci.id);
        catalogRows.push({ catalogItem: ci, unitCost, isOverridden, repairItem: existing || null });
      }
      const customRows = relevant.filter((r) => r.isCustom);
      const noActionNeeded = !!room.noActionGroups?.[groupName];
      return { catalogRows, customRows, noActionNeeded };
    },
    // Simple deal-analysis numbers for the Rooms dashboard header. Returns null
    // if the project doesn't have enough info entered to compute them.
    calcFinancials(project, totalRepairCost) {
      if (!project.purchasePrice || !project.arv) return null;
      const totalCost = project.purchasePrice + totalRepairCost;
      const profit = project.arv - totalCost;
      const roi = totalCost > 0 ? profit / totalCost * 100 : 0;
      const marginPct = project.arv > 0 ? profit / project.arv * 100 : 0;
      const targetProfit = project.targetMarginPct ? project.arv * project.targetMarginPct / 100 : null;
      const meetsTarget = project.targetMarginPct != null ? profit >= 0 && marginPct >= project.targetMarginPct : profit >= 0;
      return { profit, roi, totalCost, targetProfit, marginPct, meetsTarget };
    }
  };

  function escapeHtml6(str = "") {
    return String(str).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }
  function renderBottomNav() {
    const nav = document.getElementById("bottom-nav");
    nav.innerHTML = NAV_ITEMS.map((item) => {
      const disabled = (item.key === "rooms" || item.key === "summary") && !route.projectId;
      return `
      <button class="nav-btn ${route.screen === item.key ? "active" : ""}" data-nav="${item.key}" ${disabled ? "disabled" : ""}>
        ${item.icon}
        <span>${item.label}</span>
      </button>
    `;
    }).join("");
    nav.querySelectorAll("[data-nav]").forEach((btn) => {
      btn.addEventListener("click", () => {
        route.screen = btn.dataset.nav;
        if (btn.dataset.nav === "rooms") route.roomId = null;
        if (btn.dataset.nav === "advisor") route.aiProjectId = null;
        render();
      });
    });
  }
  async function renderScreen() {
    const root = document.getElementById("screen-root");
    if (route.screen === "projects") {
      await renderProjectsScreen(root, {
        onOpenProject: (id) => {
          route = { screen: "rooms", projectId: id, roomId: null };
          render();
        }
      });
    } else if (route.screen === "rooms" && route.projectId) {
      if (route.roomId) {
        await renderRoomDetailScreen(root, {
          projectId: route.projectId,
          roomId: route.roomId,
          onBack: () => {
            route.roomId = null;
            render();
          }
        });
      } else {
        await renderRoomsScreen(root, {
          projectId: route.projectId,
          onOpenRoom: (roomId) => {
            route.roomId = roomId;
            render();
          }
        });
      }
    } else if (route.screen === "summary" && route.projectId) {
      await renderSummaryScreen(root, {
        projectId: route.projectId,
        onOpenRoom: (roomId) => {
          route = { screen: "rooms", projectId: route.projectId, roomId };
          render();
        }
      });
    } else if (route.screen === "advisor") {
      await renderAiAdvisorScreen(root, {
        aiProjectId: route.aiProjectId,
        onSelectProject: (id) => {
          route.aiProjectId = id;
          render();
        },
        onBack: () => {
          route.aiProjectId = null;
          render();
        }
      });
    } else {
      root.innerHTML = `
      <div class="empty-state">
        <div class="mark">${icons.spark}</div>
        <h3>${route.screen[0].toUpperCase() + route.screen.slice(1)} screen</h3>
        <p>This part of the app ships in the next build phase. The project data layer underneath it is already live.</p>
      </div>
    `;
    }
  }
  async function render() {
    await renderTopbar();
    renderBottomNav();
    await renderScreen();
  }
  async function boot() {
    renderShell();
    await db.ready();
    localStore.setAppVersion(APP_VERSION);
    await render();
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch((err) => console.warn("SW registration skipped (needs https:// or localhost):", err.message));
    }
  }
  boot();
})();

  </script>
</body>
</html>
